# .github/workflows/build.yml
name: Windows Auto Package Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-package:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 使用最稳定的 Python 3.11 版本

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Compile Executable
        run: pyinstaller --noconsole --name "TrafficPlatform" --add-data "core;core" --add-data "ui;ui" --add-data "modules;modules" main.py

      - name: Compile Installer Wizard
        run: iscc setup.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrafficPlatform_Windows_Installer
          path: installer_output/TrafficPlatform_Setup_x64.exe